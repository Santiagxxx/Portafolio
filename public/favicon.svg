  <rect x="5" y="5" width="54" height="54" rx="18" fill="url(#bg)"/>
  <rect x="5" y="5" width="54" height="54" rx="18" fill="none" stroke="url(#stroke)" stroke-width="3"/>
  <circle cx="49" cy="15" r="10" fill="#00f0ff" opacity="0.16" filter="url(#glow)"/>
  <circle cx="15" cy="50" r="12" fill="#7000ff" opacity="0.18" filter="url(#glow)"/>

  <path d="M23 22L14 32L23 42" fill="none" stroke="#00f0ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M41 22L50 32L41 42" fill="none" stroke="#a855f7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="32" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="900" fill="url(#text)" letter-spacing="-2">S</text>
