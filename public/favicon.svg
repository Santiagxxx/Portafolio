<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Santiago Dev favicon">
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="0.48" stop-color="#050505"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="stroke" x1="6" y1="8" x2="58" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00f0ff"/>
      <stop offset="0.55" stop-color="#7000ff"/>
      <stop offset="1" stop-color="#ff003c"/>
    </linearGradient>
    <linearGradient id="text" x1="18" y1="18" x2="46" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#00f0ff"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
